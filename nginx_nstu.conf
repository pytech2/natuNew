# Nginx Configuration for NSTU Property Tax Manager
# File: /etc/nginx/sites-available/nstu

server {
    listen 80;
    server_name app.nstuindia.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.nstuindia.com;
    
    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/app.nstuindia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nstuindia.com/privkey.pem;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # IMPORTANT: Increase upload size for PDF files
    client_max_body_size 100M;
    
    # Frontend - React build files
    root /var/www/nstu-app/frontend/build;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # Backend API - Proxy to FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings for large file operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        
        # Important for file uploads
        client_max_body_size 100M;
        proxy_request_buffering off;
    }
    
    # CRITICAL: Direct file serving for uploads (PDF downloads)
    # This allows downloading generated PDFs without going through FastAPI
    location /api/uploads/ {
        alias /var/www/nstu-app/backend/uploads/;
        
        # Allow any file type
        default_type application/octet-stream;
        
        # PDF specific settings
        location ~* \.pdf$ {
            add_header Content-Type application/pdf;
            add_header Content-Disposition 'attachment';
        }
        
        # Excel specific settings  
        location ~* \.xlsx$ {
            add_header Content-Type application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;
            add_header Content-Disposition 'attachment';
        }
        
        # Image files
        location ~* \.(jpg|jpeg|png|gif)$ {
            expires 7d;
            add_header Cache-Control "public";
        }
        
        # Try to serve file, return 404 if not found
        try_files $uri =404;
    }
    
    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
